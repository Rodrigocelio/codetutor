<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Docs Interativa - C++</title>

  <!-- Tailwind + DaisyUI -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">

  <!-- Vue -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>

<body class="bg-base-200">

<div id="app" class="max-w-4xl mx-auto p-6">

  <!-- HEADER -->
  <div class="mb-6">
    <h1 class="text-3xl font-bold">
      {{ tutorial.titulo }}
    </h1>
    <p class="text-gray-500">
      {{ tutorial.descricao }}
    </p>
  </div>

  <!-- TABS -->
  <div role="tablist" class="tabs tabs-boxed bg-base-100 p-1 shadow mb-6">

    <a v-for="p in plataformas"
       :key="p.id"
       role="tab"
       class="tab flex gap-2 items-center transition-all duration-300"
       :class="{ 'tab-active scale-105': plataformaAtiva === p.id }"
       @click="trocarPlataforma(p.id)">

      <i :class="p.icone"></i>
      {{ p.nome }}

    </a>

  </div>

  <!-- CONTEÚDO COM ANIMAÇÃO -->
  <transition name="fade" mode="out-in">
    <div :key="plataformaAtiva">

      <div v-for="(passo, index) in tutorialAtual.passos"
           :key="index"
           class="bg-base-100 p-6 rounded-xl shadow mb-4 border-l-4"
           :class="'border-' + passo.cor + '-500'">

        <h2 class="font-bold text-xl mb-3">
          {{ index + 1 }}. {{ passo.titulo }}
        </h2>

        <!-- ALERTA (ex: PATH) -->
        <div v-if="passo.tipo === 'configuracao'" class="alert alert-warning mb-3">
          ⚠️ Passo manual importante
        </div>

        <!-- TEXTO -->
        <p v-if="passo.texto" class="mb-3 text-gray-600">
          {{ passo.texto }}
        </p>

        <!-- MOCKUP CODE -->
        <div v-if="passo.codigo" class="mockup-code text-sm relative">

          <!-- BOTÃO COPIAR -->
          <button
            @click="copiarCodigo(passo.codigo)"
            class="absolute right-3 top-3 btn btn-xs btn-ghost">
            <i class="fas fa-copy"></i>
          </button>

          <!-- LINHAS -->
          <div v-for="(linha, i) in passo.codigo" :key="i">
            <pre
              :data-prefix="passo.prefixo || (passo.tipo === 'output' ? '>' : '$')"
              :class="passo.tipo === 'output' ? 'text-green-400' : ''"
            >
<code>{{ linha }}</code>
            </pre>
          </div>

        </div>

      </div>

    </div>
  </transition>

</div>

<style>
/* Animação suave estilo SaaS */
.fade-enter-active, .fade-leave-active {
  transition: all 0.25s ease;
}
.fade-enter-from {
  opacity: 0;
  transform: translateY(10px);
}
.fade-leave-to {
  opacity: 0;
  transform: translateY(-10px);
}
</style>

<script>
const { createApp } = Vue;

createApp({

  data() {
    return {

      plataformaAtiva: 'windows',

      plataformas: [
        { id: 'windows', nome: 'Windows', icone: 'fab fa-windows' },
        { id: 'ubuntu', nome: 'Ubuntu', icone: 'fab fa-linux' }
      ],

      tutorial: {
        titulo: "Hello World em C++",
        descricao: "Guia para diferentes sistemas operacionais"
      },

      tutorialAtual: {}

    }
  },

  methods: {

    detectarSO() {
      const ua = navigator.userAgent.toLowerCase()

      if (ua.includes("win")) return "windows"
      if (ua.includes("linux")) return "ubuntu"

      return "windows"
    },

    trocarPlataforma(id) {
      this.plataformaAtiva = id
      localStorage.setItem("plataforma", id)
      this.carregarConteudo()
    },

    carregarConteudo() {

      if (this.plataformaAtiva === 'windows') {
        this.tutorialAtual = {
          passos: [
            {
              titulo: "Instalar MinGW",
              texto: "Baixe o compilador no site oficial.",
              cor: "blue"
            },
            {
              titulo: "Adicionar ao PATH",
              tipo: "configuracao",
              texto: "Copie o caminho abaixo e adicione nas variáveis de ambiente.",
              cor: "yellow",
              codigo: [
                "C:\\mingw64\\bin"
              ]
            },
            {
              titulo: "Verificar instalação",
              cor: "purple",
              codigo: [
                "g++ --version"
              ]
            },
            {
              titulo: "Compilar código",
              cor: "green",
              codigo: [
                "g++ main.cpp -o hello",
                "./hello"
              ]
            },
            {
              titulo: "Saída esperada",
              tipo: "output",
              cor: "gray",
              codigo: [
                "Hello, World!"
              ]
            }
          ]
        }
      }

      if (this.plataformaAtiva === 'ubuntu') {
        this.tutorialAtual = {
          passos: [
            {
              titulo: "Instalar g++",
              cor: "blue",
              codigo: [
                "sudo apt update",
                "sudo apt install build-essential"
              ]
            },
            {
              titulo: "Criar arquivo",
              cor: "yellow",
              codigo: [
                "nano main.cpp"
              ]
            },
            {
              titulo: "Compilar código",
              cor: "green",
              codigo: [
                "g++ main.cpp -o hello",
                "./hello"
              ]
            },
            {
              titulo: "Saída esperada",
              tipo: "output",
              cor: "gray",
              codigo: [
                "Hello, World!"
              ]
            }
          ]
        }
      }

    },

    copiarCodigo(linhas) {
      const texto = linhas.join("\n")

      navigator.clipboard.writeText(texto)
        .then(() => {
          alert("Código copiado!")
        })
    }

  },

  mounted() {
    const salvo = localStorage.getItem("plataforma")
    this.plataformaAtiva = salvo || this.detectarSO()
    this.carregarConteudo()
  }

}).mount('#app');
</script>

</body>
</html>
